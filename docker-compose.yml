version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: promptbuilder_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: promptbuilder
      POSTGRES_USER: promptbuilder
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptbuilder"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
